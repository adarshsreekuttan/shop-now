<nav class="flex flex-col md:flex-row items-center justify-between gap-6 mb-4 border-b border-gray-100">
    
    {% with status=request.GET.status|default:'all' %}
    
    <div class="flex-shrink-0">
        <h1 class="text-3xl font-extrabold text-pdark tracking-tight">My Orders</h1>
    </div>

    <div class="flex items-center gap-1 bg-white p-1 rounded-lg border border-gray-100 shadow-sm overflow-x-auto no-scrollbar">
        <a href="?status=all"
           class="px-5 py-2 rounded-md text-[11px] font-bold uppercase tracking-widest transition-all
           {% if status == 'all' %} bg-pdark text-highlight {% else %} text-gray-400 hover:bg-lightbg hover:text-pdark {% endif %}">
            All
        </a>

        <a href="?status=pending"
           class="px-5 py-2 rounded-md text-[11px] font-bold uppercase tracking-widest transition-all
           {% if status == 'pending' %} bg-pdark text-highlight {% else %} text-gray-400 hover:bg-lightbg hover:text-pdark {% endif %}">
            Pending
        </a>

        <a href="?status=processing"
           class="px-5 py-2 rounded-md text-[11px] font-bold uppercase tracking-widest transition-all
           {% if status == 'processing' %} bg-pdark text-highlight {% else %} text-gray-400 hover:bg-lightbg hover:text-pdark {% endif %}">
            Processing
        </a>

        <a href="?status=shipped"
           class="px-5 py-2 rounded-md text-[11px] font-bold uppercase tracking-widest transition-all
           {% if status == 'shipped' %} bg-pdark text-highlight {% else %} text-gray-400 hover:bg-lightbg hover:text-pdark {% endif %}">
            Shipped
        </a>

        <a href="?status=delivered"
           class="px-5 py-2 rounded-md text-[11px] font-bold uppercase tracking-widest transition-all
           {% if status == 'delivered' %} bg-pdark text-highlight {% else %} text-gray-400 hover:bg-lightbg hover:text-pdark {% endif %}">
            Delivered
        </a>

        <a href="?status=cancelled"
           class="px-5 py-2 rounded-md text-[11px] font-bold uppercase tracking-widest transition-all
           {% if status == 'cancelled' %} bg-pdark text-highlight {% else %} text-gray-400 hover:bg-lightbg hover:text-pdark {% endif %}">
            Cancelled
        </a>
    </div>

    <div class="hidden lg:flex items-center">
        <div class="bg-primary/5 border border-primary/10 px-4 py-2 rounded-md">
            <p class="text-[10px] font-bold text-primary uppercase tracking-widest">
                Total Orders: <span class="text-pdark ml-1">{{ orders|length }}</span>
            </p>
        </div>
    </div>

    {% endwith %}
</nav>
