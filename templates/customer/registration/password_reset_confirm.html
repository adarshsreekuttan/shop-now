<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set New Password | Shop Now</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { pdark: '#362F4F', primary: '#5B23FF', highlight: '#E4FF30' } } }
        }
    </script>
    <style>
        /* Django's form.as_p adds <p> tags; this keeps them clean */
        form p { margin-bottom: 1rem; }
        input { 
            width: 100%; border: 1px solid #d1d5db; border-radius: 0.375rem; 
            padding: 0.75rem; font-size: 0.875rem; background: #f9fafb;
        }
        input:focus { outline: 2px solid #5B23FF; border-color: transparent; background: white; }
        .helptext { display: block; font-size: 0.75rem; color: #6b7280; margin-top: 0.25rem; }
    </style>
</head>
<body class="bg-[url('https://images.unsplash.com/photo-1586880244406-556ebe35f282?q=80&w=2000&auto=format&fit=crop')] bg-cover bg-center bg-fixed min-h-screen flex items-center justify-center p-4">
    <div class="absolute inset-0 bg-gray-900/60"></div>
    <div class="relative z-10 w-full max-w-md bg-white/95 rounded-md shadow-xl p-8 border border-gray-200">
        {% if validlink %}
            <h2 class="text-2xl font-semibold text-pdark mb-2">New Password</h2>
            <p class="text-gray-500 text-sm mb-6">Please enter and confirm your new password below.</p>
            
            <form method="POST" class="space-y-4">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="w-full bg-pdark text-white font-semibold py-3 rounded-md hover:bg-primary transition shadow-md">
                    Update Password
                </button>
            </form>
        {% else %}
            <div class="text-center">
                <h2 class="text-2xl font-semibold text-red-600 mb-2">Invalid Link</h2>
                <p class="text-gray-600 text-sm mb-6">This password reset link is invalid, possibly because it has already been used or has expired.</p>
                <a href="{% url 'reset_password' %}" class="text-primary font-semibold hover:underline">Request a new link</a>
            </div>
        {% endif %}
    </div>
</body>
</html>
