<aside class="w-64 min-h-screen bg-slate-900 text-white hidden md:flex flex-col">
    <div class="p-6 text-2xl font-bold border-b border-slate-800">
        <span class="text-indigo-400">Shop</span>Now
    </div>
    
    <nav class="flex-1 p-4 space-y-2">
        <a href="{% url 'admin_dashboard' %}" 
           class="flex items-center space-x-3 p-3 rounded-lg transition 
           {% if request.resolver_match.url_name == 'admin_dashboard' %} bg-indigo-600 text-white {% else %} text-slate-400 hover:bg-slate-800 hover:text-white {% endif %}">
            <i class="fas fa-th-large w-5 text-center"></i>
            <span>Dashboard</span>
        </a>    

        <a href="{% url 'category_list' %}" 
           class="flex items-center space-x-3 p-3 rounded-lg transition 
           {% if request.resolver_match.url_name == 'category_list' %} bg-indigo-600 text-white {% else %} text-slate-400 hover:bg-slate-800 hover:text-white {% endif %}">
            <i class="fas fa-store w-5 text-center"></i>
            <span>Category</span>   
        </a>

        <a href="{% url 'subcategory_list' %}" 
           class="flex items-center space-x-3 p-3 rounded-lg transition 
           {% if request.resolver_match.url_name == 'subcategory_list' %} bg-indigo-600 text-white {% else %} text-slate-400 hover:bg-slate-800 hover:text-white {% endif %}">
            <i class="fas fa-store w-5 text-center"></i>
            <span>Subcategory</span>   
        </a>

        <a href="{% url 'product_view' %}" 
           class="flex items-center space-x-3 p-3 rounded-lg transition 
           {% if request.resolver_match.url_name == 'product_view' %} bg-indigo-600 text-white {% else %} text-slate-400 hover:bg-slate-800 hover:text-white {% endif %}">
            <i class="fas fa-box w-5 text-center"></i>
            <span>Products</span>
        </a>

        <a href="{% url 'order_view' %}" 
           class="flex items-center space-x-3 p-3 rounded-lg transition 
           {% if request.resolver_match.url_name == 'order_view' %} bg-indigo-600 text-white {% else %} text-slate-400 hover:bg-slate-800 hover:text-white {% endif %}">
            <i class="fas fa-shopping-cart w-5 text-center"></i>
            <span>Orders</span>
        </a>

        <a href="{% url 'user_view' %}" 
           class="flex items-center space-x-3 p-3 rounded-lg transition 
           {% if request.resolver_match.url_name == 'user_view' %} bg-indigo-600 text-white {% else %} text-slate-400 hover:bg-slate-800 hover:text-white {% endif %}">
            <i class="fas fa-users w-5 text-center"></i>
            <span>Users</span>
        </a>

        <a href="{% url 'seller_view' %}" 
           class="flex items-center space-x-3 p-3 rounded-lg transition 
           {% if request.resolver_match.url_name == 'seller_view' %} bg-indigo-600 text-white {% else %} text-slate-400 hover:bg-slate-800 hover:text-white {% endif %}">
            <i class="fas fa-store w-5 text-center"></i>
            <span>Sellers</span>
        </a>

        <a href="{% url 'pending_seller' %}" 
           class="flex items-center space-x-3 p-3 rounded-lg transition 
           {% if request.resolver_match.url_name == 'pending_seller' %} bg-indigo-600 text-white {% else %} text-slate-400 hover:bg-slate-800 hover:text-white {% endif %}">
            <i class="fas fa-store w-5 text-center"></i>
            <span>Seller Approval</span>
        </a>

        <a href="{% url 'pending_products' %}" 
           class="flex items-center space-x-3 p-3 rounded-lg transition 
           {% if request.resolver_match.url_name == 'pending_products' %} bg-indigo-600 text-white {% else %} text-slate-400 hover:bg-slate-800 hover:text-white {% endif %}">
            <i class="fas fa-store w-5 text-center"></i>
            <span>Product Approval</span>
        </a>
    </nav>

    <div class="p-4 border-t border-slate-800">
        <button class="flex items-center space-x-3 p-3 text-red-400 hover:bg-red-900/20 w-full rounded-lg transition">
            <i class="fas fa-sign-out-alt w-5 text-center"></i>
            <span>Logout</span>
        </button>
    </div>
</aside>
