<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <title>Admin | Add Category</title>
</head>
<body class="bg-gray-50 antialiased font-sans flex min-h-screen">

    <aside class="w-64 bg-white border-r border-gray-200 sticky top-0 h-screen flex-shrink-0 overflow-y-auto">
        {% include 'admin/admin_navbar.html' %}
    </aside>

    <main class="flex-1 p-8 md:p-12 overflow-y-auto">
        <div class="max-w-3xl mx-auto">
            
            <div class="mb-10">
                <nav class="text-xs font-bold text-indigo-600 uppercase tracking-widest mb-2">Inventory Management</nav>
                <h1 class="text-3xl font-black text-gray-900 tracking-tight">Create New Category</h1>
                <p class="text-gray-500 mt-1 font-medium">Define a new collection to organize your store products.</p>
            </div>

            <div class="bg-white rounded-3xl shadow-sm border border-gray-200 overflow-hidden">
                <form method="POST" enctype="multipart/form-data" class="p-8 md:p-10 space-y-8">
                    {% csrf_token %}

                    <div>
                        <label class="block text-xs font-black text-gray-700 uppercase tracking-wider mb-2">Category Name</label>
                        <input type="text" name="name" required
                            class="w-full px-5 py-3 border border-gray-200 rounded-2xl focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 outline-none transition-all font-medium text-gray-800 placeholder-gray-400"
                            placeholder="e.g. Premium Electronics">
                    </div>

                    <div>
                        <label class="block text-xs font-black text-gray-700 uppercase tracking-wider mb-2">Description</label>
                        <textarea name="description" rows="4"
                            class="w-full px-5 py-3 border border-gray-200 rounded-2xl focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 outline-none transition-all font-medium text-gray-800 placeholder-gray-400"
                            placeholder="Briefly describe what customers will find in this category..."></textarea>
                    </div>

                    <div>
                        <label class="block text-xs font-black text-gray-700 uppercase tracking-wider mb-2">Display Image</label>
                        <div class="mt-1 flex justify-center px-6 pt-10 pb-10 border-2 border-gray-200 border-dashed rounded-3xl hover:border-indigo-400 hover:bg-indigo-50/30 transition-all group cursor-pointer relative">
                            <div class="space-y-2 text-center">
                                <div class="bg-gray-100 group-hover:bg-indigo-100 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto transition-colors">
                                    <svg class="h-8 w-8 text-gray-400 group-hover:text-indigo-600" stroke="currentColor" fill="none" viewBox="0 0 48 48">
                                        <path d="M28 8H12a4 4 0 00-4 4v20m32-12v8m0 0v8a4 4 0 01-4 4H12a4 4 0 01-4-4v-4m32-4l-3.172-3.172a4 4 0 00-5.656 0L28 28M8 32l9.172-9.172a4 4 0 015.656 0L28 28m0 0l4 4m4-24h8m-4-4v8m-12 4h.02" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                                    </svg>
                                </div>
                                <div class="flex text-sm text-gray-600">
                                    <label for="image" class="relative cursor-pointer font-bold text-indigo-600 hover:text-indigo-500 focus-within:outline-none">
                                        <span>Click to upload</span>
                                        <input id="image" name="image" type="file" class="sr-only" accept="image/*">
                                    </label>
                                    <p class="pl-1">or drag and drop</p>
                                </div>
                                <p class="text-xs text-gray-400 font-medium">SVG, PNG, JPG or GIF (max. 10MB)</p>
                            </div>
                        </div>
                    </div>

                    <div class="flex items-center justify-end space-x-4 pt-6 border-t border-gray-50">
                        <a href="{% url 'category_list' %}" 
                           class="px-6 py-2.5 rounded-xl text-sm font-bold text-gray-500 hover:bg-gray-100 transition-all">
                           Cancel
                        </a>
                        <button type="submit"
                            class="bg-indigo-600 text-white px-8 py-2.5 rounded-xl font-bold shadow-lg shadow-indigo-200 hover:bg-indigo-700 hover:-translate-y-0.5 active:translate-y-0 transition-all text-sm">
                            Create Category
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </main>

</body>
</html>
