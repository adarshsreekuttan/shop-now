<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | Edit Product</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style type="text/tailwindcss">
        @layer components {
            .input-field {
                @apply w-full px-5 py-3 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 outline-none transition-all font-medium text-slate-800 placeholder-slate-400 text-sm md:text-base;
            }
            .label-title {
                @apply block text-[10px] md:text-xs font-black text-slate-700 uppercase tracking-widest mb-2 ml-1;
            }
        }
        /* Custom scrollbar for sidebar */
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
    <script>
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            sidebar.classList.toggle('-translate-x-full');
            overlay.classList.toggle('hidden');
        }
    </script>
</head>
<body class="bg-[#f8fafc] text-slate-900 antialiased font-sans relative overflow-x-hidden">

    <div id="overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-slate-900/40 z-40 hidden md:hidden transition-opacity"></div>

    <div class="flex min-h-screen">
        <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-64 bg-white border-r border-slate-200 transform -translate-x-full md:translate-x-0 md:sticky md:top-0 h-screen transition-transform duration-300 ease-in-out flex-shrink-0 overflow-y-auto custom-scrollbar">
            <div class="p-4 flex justify-between items-center md:hidden border-b border-slate-100">
                <span class="font-black text-indigo-600 uppercase tracking-widest text-xs">Menu</span>
                <button onclick="toggleSidebar()" class="text-slate-400 p-2">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>
            {% include 'admin/admin_navbar.html' %}
        </aside>

        <main class="flex-1 min-w-0">
            <header class="md:hidden flex items-center justify-between p-4 bg-white border-b border-slate-200 sticky top-0 z-30">
                <button onclick="toggleSidebar()" class="w-10 h-10 flex items-center justify-center bg-slate-50 rounded-xl border border-slate-200 text-slate-600">
                    <i class="fas fa-bars-staggered"></i>
                </button>
                <span class="font-black text-slate-900 text-sm uppercase tracking-tight">Edit Product</span>
                <div class="w-10"></div>
            </header>

            <div class="max-w-5xl mx-auto px-4 sm:px-6 py-8 md:py-12">
                
                <div class="flex flex-col sm:flex-row sm:items-center justify-between mb-8 md:mb-10 gap-4">
                    <div>
                        <nav class="flex text-[9px] md:text-[10px] font-bold text-indigo-600 uppercase tracking-widest mb-2 gap-2">
                            <a href="{% url 'product_view' %}" class="hover:underline">Inventory</a>
                            <span class="text-slate-300">/</span>
                            <span class="text-slate-400">Modify</span>
                        </nav>
                        <h1 class="text-2xl md:text-3xl font-black text-slate-900 tracking-tight">Edit Product</h1>
                        <p class="text-slate-500 font-medium text-sm">Updating: <span class="text-indigo-600">"{{ products.name }}"</span></p>
                    </div>
                    
                    <a href="{% url 'product_view' %}" class="text-xs md:text-sm font-bold text-slate-400 hover:text-slate-600 transition flex items-center self-start sm:self-auto">
                        <i class="fas fa-arrow-left mr-2"></i> Back to list
                    </a>
                </div>

                <div class="bg-white rounded-[1.5rem] md:rounded-[2.5rem] shadow-sm border border-slate-200 overflow-hidden">
                    <form action="{% url 'edit_product' products.id %}" method="POST" class="p-6 md:p-12">
                        {% csrf_token %}

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-5 md:gap-y-6">
                            
                            <div class="md:col-span-2">
                                <label class="label-title">Product Name</label>
                                <input type="text" name="name" value="{{ products.name }}" required
                                    class="input-field" placeholder="e.g. Premium Wireless Headphones">
                            </div>

                            <div>
                                <label class="label-title">Assigned Seller</label>
                                <div class="relative">
                                    <select name="seller" required class="input-field appearance-none">
                                        {% for s in seller %}
                                            <option value="{{ s.id }}" {% if s.id == products.seller_id %}selected{% endif %}>
                                                {{ s.user.username }}
                                            </option>
                                        {% endfor %}
                                    </select>
                                    <i class="fas fa-chevron-down absolute right-5 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none text-xs"></i>
                                </div>
                            </div>

                            <div>
                                <label class="label-title">Inventory Stock</label>
                                <div class="relative">
                                    <i class="fas fa-box absolute left-5 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
                                    <input type="number" name="stock" value="{{ products.stock }}" required
                                        class="input-field pl-12">
                                </div>
                            </div>

                            <div>
                                <label class="label-title">Retail Price ($)</label>
                                <div class="relative">
                                    <span class="absolute left-5 top-1/2 -translate-y-1/2 text-slate-400 font-bold">$</span>
                                    <input type="number" step="0.01" name="price" value="{{ products.price }}" required
                                        class="input-field pl-10">
                                </div>
                            </div>

                            <div>
                                <label class="label-title">Discount Price ($)</label>
                                <div class="relative">
                                    <span class="absolute left-5 top-1/2 -translate-y-1/2 text-slate-400 font-bold">$</span>
                                    <input type="number" step="0.01" name="discount_price" value="{{ products.discount_price }}"
                                        class="input-field pl-10">
                                </div>
                            </div>

                            <div>
                                <label class="label-title">Category</label>
                                <div class="relative">
                                    <select name="category" required class="input-field appearance-none">
                                        {% for cat in category %}
                                            <option value="{{ cat.id }}" {% if cat.id == products.category_id %}selected{% endif %}>
                                                {{ cat.name }}
                                            </option>
                                        {% endfor %}
                                    </select>
                                    <i class="fas fa-chevron-down absolute right-5 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none text-xs"></i>
                                </div>
                            </div>

                            <div>
                                <label class="label-title">Sub-Category</label>
                                <div class="relative">
                                    <select name="subcategory" required class="input-field appearance-none">
                                        {% for sub in subcategory %}
                                            <option value="{{ sub.id }}" {% if sub.id == products.sub_category_id %}selected{% endif %}>
                                                {{ sub.name }}
                                            </option>
                                        {% endfor %}
                                    </select>
                                    <i class="fas fa-chevron-down absolute right-5 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none text-xs"></i>
                                </div>
                            </div>

                            <div class="md:col-span-2">
                                <label class="label-title">Full Description</label>
                                <textarea name="description" rows="5" required
                                    class="input-field resize-none h-32 md:h-auto">{{ products.description }}</textarea>
                            </div>
                        </div>

                        <div class="mt-8 md:mt-10 pt-6 md:pt-8 border-t border-slate-100 flex flex-col-reverse sm:flex-row items-center justify-end gap-3 md:gap-4">
                            <a href="{% url 'product_view' %}" class="w-full sm:w-auto text-center px-6 py-3 rounded-xl text-sm font-bold text-slate-500 hover:bg-slate-50 transition-all">
                                Discard Changes
                            </a>
                            <button type="submit" 
                                    class="w-full sm:w-auto bg-indigo-600 text-white px-8 md:px-10 py-3.5 md:py-3 rounded-2xl font-bold shadow-lg shadow-indigo-100 hover:bg-indigo-700 hover:-translate-y-1 active:translate-y-0 transition-all text-sm">
                                <i class="fas fa-check-circle mr-2"></i> Update Product
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
