<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlipShop - Product Submitted</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary_dark: '#362F4F',
                        primary: '#5B23FF',
                        accent: '#008BFF',
                        highlight: '#E4FF30',
                        bg_light: '#F1F3F6',
                        text_dark: '#212121',
                        text_gray: '#878787'
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    animation: {
                        'ripple': 'ripple 2s cubic-bezier(0, 0.2, 0.8, 1) infinite',
                        'float': 'float 3s ease-in-out infinite',
                    },
                    keyframes: {
                        ripple: {
                            '0%': { transform: 'scale(0.8)', opacity: '1' },
                            '100%': { transform: 'scale(2.5)', opacity: '0' },
                        },
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' },
                        }
                    }
                }
            }
        }
    </script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #F1F3F6; }
        .card-shadow { box-shadow: 0 10px 30px -5px rgba(0,0,0,0.08); }
    </style>
</head>
<body class="text-text_dark flex flex-col min-h-screen">

    {% include 'seller/navbar.html' %}
    <main class="flex-grow container mx-auto px-4 flex items-center justify-center py-12">
        
        <div class="bg-white rounded-2xl card-shadow w-full max-w-lg p-8 sm:p-12 text-center relative overflow-hidden">
            
            <div class="absolute -top-24 -right-24 w-48 h-48 bg-green-400 rounded-full opacity-10 blur-3xl"></div>
            <div class="absolute -bottom-24 -left-24 w-48 h-48 bg-emerald-400 rounded-full opacity-10 blur-3xl"></div>

            <div class="relative w-32 h-32 mx-auto mb-8 flex items-center justify-center animate-float">
                <div class="absolute inset-0 border-4 border-green-500/30 rounded-full animate-ripple"></div>
                <div class="absolute inset-0 border-4 border-green-500/20 rounded-full animate-ripple" style="animation-delay: 0.5s;"></div>
                
                <div class="relative z-10 w-20 h-20 bg-gradient-to-tr from-green-400 to-green-600 rounded-full shadow-xl flex items-center justify-center text-white text-4xl">
                    <i class="fa-solid fa-check"></i>
                </div>
                
                <div class="absolute bottom-4 right-4 z-20 w-8 h-8 bg-white text-green-600 rounded-full flex items-center justify-center shadow-md border-2 border-green-100 text-sm">
                    <i class="fa-solid fa-store"></i>
                </div>
            </div>

            <h1 class="text-2xl sm:text-3xl font-bold text-primary_dark mb-3">Product Submitted Successfully!</h1>
            <p class="text-gray-500 text-sm sm:text-base mb-10 leading-relaxed">
                Great news! Your product details have been securely sent to our admin team. It is currently <span class="font-semibold text-green-600">under review</span> and will go live on the store as soon as it is approved.
            </p>

            <div class="flex flex-col sm:flex-row gap-3 justify-center">
                <a href="{% url 'seller_home' %}" class="px-6 py-3 text-sm font-semibold text-gray-600 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 transition w-full sm:w-auto flex items-center justify-center gap-2">
                    <i class="fa-solid fa-house"></i> Home
                </a>
                <a href="{% url 'seller_pending_approval' %}" class="px-6 py-3 text-sm font-bold text-white bg-green-600 rounded-lg shadow-md hover:bg-green-700 transition active:scale-[0.98] w-full sm:w-auto flex items-center justify-center gap-2">
                    <i class="fa-solid fa-list-check"></i> View Pending Products
                </a>
            </div>

        </div>

    </main>

    {% include 'seller/footer.html' %}
</body>
</html>
